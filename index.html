<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <!-- IST clock (top-right corner) -->
  <div class="istClock" aria-label="IST Clock">
    <div class="istTime" id="istTime">--:--:--</div>
    <div class="istDate" id="istDate">---</div>
  </div>

  <main class="app" aria-label="Study Timer App">
    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Presets">
      <div class="brand">
        <div class="logo">⏳</div>
        <div>
          <div class="brandTitle">Study Timer</div>
          <div class="brandSub" id="statusText">Ready</div>
        </div>
      </div>

      <div class="sectionTitle">Presets</div>

      <div class="presetList" role="tablist" aria-label="Timer presets">
        <button class="preset is-active" type="button" data-preset="normal" role="tab" aria-selected="true">
          <div class="presetName">Normal</div>
          <div class="presetMeta">Focus 25 • Break 5</div>
        </button>

        <button class="preset" type="button" data-preset="focus" role="tab" aria-selected="false">
          <div class="presetName">Focus</div>
          <div class="presetMeta">Focus 45 • Break 15</div>
        </button>

        <button class="preset" type="button" data-preset="revision" role="tab" aria-selected="false">
          <div class="presetName">Revision</div>
          <div class="presetMeta">Focus 10 • Break 3</div>
        </button>
      </div>

      <div class="mini">
        <div class="miniRow">
          <span class="miniLabel">Current preset</span>
          <span class="miniValue" id="presetPill">Normal</span>
        </div>
        <div class="miniRow">
          <span class="miniLabel">Phase</span>
          <span class="miniValue" id="phasePill">Focus</span>
        </div>
        <div class="miniRow">
          <span class="miniLabel">Focus length</span>
          <span class="miniValue mono" id="focusLen">25:00</span>
        </div>
        <div class="miniRow">
          <span class="miniLabel">Break length</span>
          <span class="miniValue mono" id="breakLen">05:00</span>
        </div>
      </div>

      <!-- Spotify embed -->
      <div class="sectionTitle">Spotify</div>
      <div class="spotifyBox" aria-label="Spotify Embed">
        <!-- Replace the src with your playlist/track embed link -->
        <iframe
          style="border-radius:14px"
          src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator"
          width="100%"
          height="152"
          frameborder="0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
          title="Spotify Player"
        ></iframe>
      </div>

      <div class="keys">
        <div class="keyTitle">Shortcuts</div>
        <div class="keyGrid">
          <div class="key"><span>Space</span><span>Start/Pause</span></div>
          <div class="key"><span>R</span><span>Reset</span></div>
          <div class="key"><span>S</span><span>Switch</span></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <section class="main" aria-label="Timer">
      <div class="card">
        <header class="cardTop">
          <div class="cardTitle">Timer</div>
          <div class="chips">
            <button class="chip is-active" id="focusChip" type="button">Focus</button>
            <button class="chip" id="breakChip" type="button">Break</button>
          </div>
        </header>

        <div class="time" aria-live="polite" aria-atomic="true">
          <span id="timeDisplay">25:00</span>
        </div>

        <div class="progress" aria-label="Progress">
          <div class="progressFill" id="progressBar" style="width:100%"></div>
        </div>

        <div class="controls" aria-label="Controls">
          <button class="btn primary" id="startBtn" type="button">Start</button>
          <button class="btn" id="pauseBtn" type="button" disabled>Pause</button>
          <button class="btn" id="resetBtn" type="button">Reset</button>
          <button class="btn ghost" id="switchBtn" type="button">Switch Focus/Break</button>
        </div>

        <p class="note">Preset click updates timer. Timer end auto-switches phase.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
