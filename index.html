<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <section class="panel" aria-label="Study Timer">
      <header class="top">
        <div>
          <h1 class="title">Study Timer</h1>
          <p class="sub" id="statusText">Ready</p>
        </div>
        <div class="meta">
          <span class="pill" id="presetPill">Normal</span>
          <span class="pill" id="phasePill">Focus</span>
        </div>
      </header>

      <div class="presets" role="tablist" aria-label="Presets">
        <button class="tab is-active" type="button" data-preset="normal" role="tab" aria-selected="true">
          Normal <span class="tiny">25 / 5</span>
        </button>
        <button class="tab" type="button" data-preset="focus" role="tab" aria-selected="false">
          Focus <span class="tiny">45 / 15</span>
        </button>
        <button class="tab" type="button" data-preset="revision" role="tab" aria-selected="false">
          Revision <span class="tiny">10 / 3</span>
        </button>
      </div>

      <div class="clock" aria-live="polite" aria-atomic="true">
        <span id="timeDisplay">25:00</span>
      </div>

      <div class="bar" aria-label="Progress">
        <div class="barFill" id="progressBar" style="width: 100%;"></div>
      </div>

      <div class="row">
        <div class="info">
          <div class="infoLine">
            <span class="label">Focus</span>
            <span id="focusLen">25:00</span>
          </div>
          <div class="infoLine">
            <span class="label">Break</span>
            <span id="breakLen">05:00</span>
          </div>
        </div>

        <div class="controls" aria-label="Controls">
          <button class="btn primary" id="startBtn" type="button">Start</button>
          <button class="btn" id="pauseBtn" type="button" disabled>Pause</button>
          <button class="btn" id="resetBtn" type="button">Reset</button>
          <button class="btn ghost" id="switchBtn" type="button">Switch Focus/Break</button>
        </div>
      </div>

      <footer class="hint">
        <span>Space = Start/Pause</span>
        <span>R = Reset</span>
        <span>S = Switch</span>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
